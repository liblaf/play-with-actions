name: Shared / MegaLinter

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_COLOR: 1
  GIT_COMMIT_MESSAGE: "chore(mega-linter): apply linters automatic fixes"

jobs:
  mega-linter:
    name: MegaLinter
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    environment:
      name: MegaLinter
      deployment: false
    outputs:
      pull-request-url: ${{ steps.pr.outputs.pull-request-url }}
    steps:
      - id: auth
        name: Auth
        uses: liblaf/actions/auth@cadf1f6ac2bed9a0ebc033e74a2c0994813e7f04 # v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: lint
        name: MegaLinter
        uses: liblaf/actions/mega-linter@cadf1f6ac2bed9a0ebc033e74a2c0994813e7f04 # v1
        with:
          token: ${{ steps.auth.outputs.token }}
      - if: success() || failure()
        name: Upload reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: mega-linter-reports
          path: |-
            mega-linter.log
            megalinter-reports
          include-hidden-files: true
      - if: success() || failure()
        name: Remove MegaLinter reports
        run: |-
          cp --target-directory='${{ runner.temp }}' --verbose 'megalinter-reports/megalinter-report.md'
          sudo rm --force --recursive 'mega-linter.log' 'megalinter-reports'
      - id: pr
        if: steps.lint.outputs.has-updated-sources == 1 && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        name: Create PR
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          token: ${{ steps.auth.outputs.token }}
          commit-message: ${{ env.GIT_COMMIT_MESSAGE }}
          branch: mega-linter/${{ github.head_ref || github.ref_name }}
          sign-commits: true
          title: ${{ env.GIT_COMMIT_MESSAGE }}
          body-path: ${{ runner.temp }}/megalinter-report.md
          labels: |-
            automerge
            mega-linter
          assignees: ${{ github.repository_owner }}
          reviewers: ${{ github.repository_owner }}

  review:
    name: Review
    permissions:
      pull-requests: write
    needs:
      - mega-linter
    if: needs.mega-linter.outputs.pull-request-url
    runs-on: ubuntu-latest
    environment:
      name: Review
      deployment: false
    steps:
      - name: Review
        uses: liblaf/actions/review@cadf1f6ac2bed9a0ebc033e74a2c0994813e7f04 # v1
        with:
          pull: ${{ needs.mega-linter.outputs.pull-request-url }}
          review-token: ${{ secrets.REVIEW_TOKEN }}
